<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Debug GSheets</title>
<script src="config.js"></script>
<script src="data.js"></script>
<style>
body{font-family:monospace;background:#0f172a;color:#e2e8f0;padding:16px;font-size:12px}
h2{color:#3b82f6;margin:14px 0 4px;font-size:14px}
.ok{color:#22c55e}.err{color:#ef4444}.warn{color:#f59e0b}
pre{background:#1e293b;padding:10px;border-radius:6px;overflow-x:auto;white-space:pre-wrap;font-size:11px;max-height:300px;overflow-y:auto}
button{background:#1e4d8c;color:#fff;padding:7px 14px;border:none;border-radius:5px;cursor:pointer;margin:3px;font-family:monospace;font-size:11px}
select{background:#1e293b;color:#fff;padding:5px;border:1px solid #334155;border-radius:4px}
table{border-collapse:collapse;width:100%;font-size:10px}
td,th{border:1px solid #334155;padding:4px 8px;text-align:left}
th{background:#1e4d8c}
.null{color:#475569;font-style:italic}
</style>
</head>
<body>
<h2>🔍 Debug — Sheet: <span id="sid"></span></h2>

<div style="margin:10px 0;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
  <select id="sh">
    <option>INFO</option><option>COURBE_S</option><option>DISCIPLINES</option>
    <option>JALONS</option><option>TERRASSEMENT_QTE</option><option>TERR_JALONS</option>
    <option>PIEUX_KPI</option><option>PIEUX_JALONS</option>
  </select>
  <button onclick="testRaw()">Lignes brutes</button>
  <button onclick="testAll()">Test complet</button>
  <button onclick="testCourbe()">Debug Courbe S</button>
</div>
<div id="out"></div>

<script>
document.getElementById('sid').textContent = CONFIG.SHEET_ID;
const out = document.getElementById('out');
const lg = h => out.innerHTML += h;
const cl = () => out.innerHTML = '';

async function testRaw(){
  cl();
  const name = document.getElementById('sh').value;
  lg(`<h2>Feuille: ${name} — lignes brutes</h2>`);
  try{
    const rows = await GS.fetchRows(name);
    lg(`<p class="ok">✅ ${rows.length} lignes</p>`);
    lg('<table><tr><th>#</th>'+Array.from({length:7},(_,i)=>`<th>[${i}]</th>`).join('')+'</tr>');
    rows.slice(0,20).forEach((r,i)=>{
      const cells = (r||[]).slice(0,7).map(v=>
        v===null?`<td class="null">null</td>`:`<td>${JSON.stringify(v)}</td>`
      ).join('');
      lg(`<tr><td>${i+1}</td>${cells}</tr>`);
    });
    lg('</table>');
    if(rows.length>20) lg(`<p class="warn">... et ${rows.length-20} lignes de plus</p>`);
  }catch(e){ lg(`<p class="err">❌ ${e.message}</p>`); }
}

async function testCourbe(){
  cl();
  lg('<h2>Debug Courbe S</h2>');
  try{
    const rows = await GS.fetchRows('COURBE_S');
    lg(`<p>Lignes brutes: <b>${rows.length}</b></p>`);
    lg('<h2>Toutes les lignes (col[0] et col[1] et col[2])</h2><pre>');
    rows.forEach((r,i)=>{
      const c0=JSON.stringify(r?r[0]:null);
      const c1=JSON.stringify(r?r[1]:null);
      const c2=JSON.stringify(r?r[2]:null);
      const isSem = r && /^s\s*\d+$/i.test(String(r[0]||''));
      lg(`${isSem?'✅':'  '} Row${i+1}: [${c0}, ${c1}, ${c2}]\n`);
    });
    lg('</pre>');
    const parsed = GS.parseCourbe(rows);
    lg(`<p class="${parsed.length>0?'ok':'err'}">${parsed.length>0?'✅':'❌'} Parsé: ${parsed.length} semaines</p>`);
    if(parsed.length>0){
      lg('<pre>');
      parsed.slice(0,5).forEach(r=>lg(JSON.stringify(r)+'\n'));
      lg('... </pre>');
    }
  }catch(e){ lg(`<p class="err">❌ ${e.message}</p>`); }
}

async function testAll(){
  cl();
  lg('<h2>Test complet loadAll()</h2>');
  try{
    const d = await GS.loadAll();
    lg(`<p class="ok">✅ Données chargées</p>`);
    lg(`<pre>
Projet      : ${d.projet}
Semaine     : ${d.semaine}
reel_pct    : ${d.reel_pct}
plan_pct    : ${d.plan_pct}
SPI / CPI   : ${d.spi} / ${d.cpi}
courbe      : ${d.courbe.length} semaines (réel: ${d.courbe.filter(r=>r.reel!==null).length})
disciplines : ${d.disciplines.length}
jalons      : ${d.jalons.length}
</pre>`);

    if(d.courbe.length===0){
      lg('<p class="err">❌ COURBE VIDE — vérifiez feuille COURBE_S</p>');
    } else {
      lg('<h2>Courbe S — 5 premiers</h2><pre>');
      d.courbe.slice(0,5).forEach(r=>lg(JSON.stringify(r)+'\n'));
      lg('</pre>');
    }

    if(d.reel_pct===0 && d.plan_pct===0){
      lg('<p class="err">❌ reel_pct et plan_pct = 0 — vérifiez feuille INFO</p>');
    }
  }catch(e){
    lg(`<p class="err">❌ Erreur: ${e.message}</p>`);
  }
}
</script>
</body>
</html>
